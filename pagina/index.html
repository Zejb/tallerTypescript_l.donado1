<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TV Series</title>
    <link
      rel="stylesheet"
      href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"
    />
    <style>
      body {
        font-family: Arial, Helvetica, sans-serif;
      }

      .header-bar {
        background-color: #2fb3c2;
        color: white;
        padding: 8px 12px;
        font-weight: bold;
        width: 100%;
        margin-bottom: 10px;
      }

      .main-container {
        margin-top: 30px;
        max-width: 900px;
      }

      .table td,
      .table th {
        vertical-align: middle;
      }

      .average-text {
        margin-top: 8px;
        font-size: 15px;
      }

      .series-link {
        color: #007bff;
        cursor: pointer;
      }

      .series-link:hover {
        text-decoration: underline;
      }

      .card img {
        width: 100%;
      }
    </style>
  </head>
  <body>
    <div class="container main-container">
      <div class="header-bar">📺 TV Series</div>

      <div class="row">
        <div class="col-8">
          <table class="table table-striped">
            <thead class="thead-light">
              <tr>
                <th>#</th>
                <th>Name</th>
                <th>Channel</th>
                <th>Seasons</th>
              </tr>
            </thead>
            <tbody id="series-body"></tbody>
          </table>

          <p id="average-seasons" class="average-text"></p>
        </div>

        <div class="col-4">
          <div id="series-detail"></div>
        </div>
      </div>
    </div>

    <script type="module" src="./scripts/main.js"></script>
  </body>
</html>
